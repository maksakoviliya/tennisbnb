services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=tennisbnb
      - DB_USERNAME=tennisbnb
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tennisbnb

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=tennisbnb
      - MYSQL_USER=tennisbnb
      - MYSQL_PASSWORD=secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tennisbnb", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennisbnb

networks:
  tennisbnb:
    driver: bridge

volumes:
  mysql_data:
